<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alerta de Entrega IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-indigo-50 to-blue-100 min-h-screen p-4 flex flex-col items-center font-sans">

    <div class="w-full max-w-md space-y-6">
        
        <!-- Header Modernizado -->
        <div class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white rounded-3xl p-6 shadow-xl text-center">
            <h1 class="text-2xl font-black">🤖 Alerta de Entrega IA</h1>
            <p class="text-blue-100 text-sm mt-1">Rastreamento inteligente em tempo real</p>
        </div>

        <!-- Configuração WhatsApp -->
        <div class="bg-white rounded-3xl p-6 shadow-lg border border-indigo-100">
            <label class="text-sm font-bold text-gray-600 block mb-2">Seu número WhatsApp:</label>
            <input type="tel" id="whatsappNumber" placeholder="5511999999999" 
                   class="w-full px-4 py-3 bg-gray-50 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none font-mono">
            <button onclick="salvarWhatsApp()" class="mt-2 w-full text-xs text-blue-600 font-bold hover:underline text-left">Salvar número</button>
        </div>

        <!-- Novo Pedido -->
        <div class="bg-white rounded-3xl p-6 shadow-lg border border-indigo-100 space-y-4">
            <input type="text" id="codigoRastreio" placeholder="Código de rastreamento (ex: BR123456)" 
                   class="w-full px-4 py-3 bg-gray-50 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none">
            <button onclick="adicionarPedido()" 
                    class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg hover:shadow-blue-200 transition-all">
                Adicionar e Rastrear
            </button>
        </div>

        <!-- Lista de Pedidos -->
        <div class="space-y-3">
            <div class="flex justify-between items-center px-2">
                <h2 class="text-sm font-bold text-gray-500 uppercase tracking-wider">Meus Pedidos</h2>
                <!-- NOVO BOTÃO: Limpar Histórico -->
                <button onclick="limparHistorico()" class="text-xs text-red-500 font-semibold hover:underline">
                    Limpar Histórico
                </button>
            </div>
            <div id="listaPedidos" class="space-y-3">
                <!-- Pedidos renderizados aqui -->
            </div>
        </div>

        <!-- NOVO BOTÃO: Apoiar com Mercado Pago -->
        <div class="pt-2">
            <a href="https://mpago.la/1frU2RG" target="_blank"
               class="w-full bg-gradient-to-r from-lightblue-500 to-blue-500 bg-sky-500 text-white font-bold py-3 px-4 rounded-2xl shadow-md hover:bg-sky-600 transition-all flex justify-center items-center gap-2 text-sm text-center">
                💙 Apoiar o App via Mercado Pago
            </a>
        </div>
    </div>

    <script>
        // Carrega dados iniciais
        let pedidos = JSON.parse(localStorage.getItem('pedidos')) || [];
        document.getElementById('whatsappNumber').value = localStorage.getItem('whatsapp') || "";

        function salvarWhatsApp() {
            const num = document.getElementById('whatsappNumber').value;
            localStorage.setItem('whatsapp', num);
            alert("Número salvo com sucesso!");
        }

        async function adicionarPedido() {
            const codigo = document.getElementById('codigoRastreio').value.trim();
            if (!codigo) return alert("Digite um código");

            const statusSimulado = "Em trânsito";
            
            pedidos.push({ codigo, status: statusSimulado });
            localStorage.setItem('pedidos', JSON.stringify(pedidos));
            document.getElementById('codigoRastreio').value = ""; // Limpa o campo após adicionar
            renderizar();
        }

        // NOVA FUNÇÃO: Limpar Histórico
        function limparHistorico() {
            if (pedidos.length === 0) return;
            
            if (confirm("Tem certeza que deseja apagar todo o histórico de alertas?")) {
                pedidos = [];
                localStorage.removeItem('pedidos');
                renderizar();
            }
        }

        function renderizar() {
            const container = document.getElementById('listaPedidos');
            
            if (pedidos.length === 0) {
                container.innerHTML = `<p class="text-center text-sm text-gray-400 py-4 bg-white/50 rounded-2xl border border-dashed border-gray-300">Nenhum pedido no histórico.</p>`;
                return;
            }

            container.innerHTML = pedidos.map((p, i) => `
                <div class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center border-l-4 border-blue-500">
                    <div>
                        <p class="font-bold text-gray-800">${p.codigo}</p>
                        <p class="text-xs text-blue-600 font-semibold">${p.status}</p>
                    </div>
                    <button onclick="notificarWhatsApp('${p.codigo}')" class="bg-green-500 text-white px-4 py-2 rounded-xl text-sm font-bold shadow-sm hover:bg-green-600 transition-colors">Alertar</button>
                </div>
            `).join('');
        }

        function notificarWhatsApp(codigo) {
            const tel = localStorage.getItem('whatsapp');
            if (!tel) return alert("Configure seu número de WhatsApp primeiro!");
            
            const msg = `Olá! O rastreio ${codigo} está chegando! 🎉`;
            window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        renderizar();
    </script>
</body>
</html>
